<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Trivago | Login</title>
  <link href="/static/assets/css/dashboard.css" rel="stylesheet">
</head>

<body>

<div class="something-simple" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">

  <div style="width:100%; max-width:420px;">

    <div class="top-row" style="justify-content:center; margin-bottom:20px;">
      <div class="logo-area" style="text-align:center;">
        <div class="logo">Hotel Trivago</div>
      </div>
    </div>

    <div class="inventory-panel" style="padding:32px; border-radius:28px;">

      <div class="section-header" style="margin-bottom:20px;">
        <div class="section-title">Dashboard Login</div>
      </div>

      <div style="display:flex; flex-direction:column; gap:16px;">

        <div>
          <div style="font-size:12px; color:var(--text-lighter); margin-bottom:6px;">
            Username
          </div>
          <input 
            type="text" 
            placeholder="Enter username"
            style="width:100%; padding:14px; border-radius:14px; border:1px solid #eee;"
          >
        </div>

        <div>
          <div style="font-size:12px; color:var(--text-lighter); margin-bottom:6px;">
            Password
          </div>
          <input 
            type="password" 
            placeholder="••••••••"
            style="width:100%; padding:14px; border-radius:14px; border:1px solid #eee;"
          >
        </div>

        <button 
          style="
            margin-top:10px;
            padding:14px;
            border-radius:16px;
            border:none;
            background:black;
            color:white;
            font-weight:600;
            cursor:pointer;
          "
        >
          Login
        </button>

      </div>

    </div>

  </div>

</div>

</body>
</html>
